services:
  postgres:
    image: postgres:16-alpine
    container_name: dinhdung-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dinhdung_transport
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dinhdung_transport"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: dinhdung-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      UPLOAD_DIR: /app/uploads
      RUN_SEED_ON_BOOT: ${RUN_SEED_ON_BOOT:-false}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    container_name: dinhdung-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-5173}:80"

  admin:
    build:
      context: .
      dockerfile: ./apps/admin/Dockerfile
    container_name: dinhdung-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${ADMIN_PORT:-5174}:80"

volumes:
  postgres_data:
  backend_uploads:
